<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormaPrint BR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body {
      background: #1B2A4A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Lato', sans-serif;
    }

    /* Partículas de fundo */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(212,175,55,.08);
      animation: floatPart linear infinite;
    }

    /* Glow central */
    .bg-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,.07), transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .6; }
      50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    }
    @keyframes floatPart {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* Container principal */
    .splash {
      position: relative;
      text-align: center;
      padding: 40px 32px;
      max-width: 540px;
      z-index: 10;
    }

    /* Linha dourada decorativa */
    .gold-line {
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      margin: 0 auto 40px;
      animation: expandLine 1s ease .3s forwards;
    }
    @keyframes expandLine {
      to { width: 180px; }
    }

    /* Logo */
    .logo-wrap {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp .7s ease .5s forwards;
      margin-bottom: 32px;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -.02em;
    }
    .lf { color: #FFFFFF; }
    .lp { color: #D4AF37; }
    .lb { color: rgba(255,255,255,.35); font-size: 1.8rem; }

    /* Frase principal */
    .frase-wrap {
      margin-bottom: 36px;
    }
    .frase-linha {
      overflow: hidden;
      margin-bottom: 6px;
    }
    .frase-linha span {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.2;
      transform: translateY(100%);
      animation: slideUp .7s cubic-bezier(.22,1,.36,1) forwards;
    }
    .frase-linha:nth-child(1) span { animation-delay: .9s; }
    .frase-linha:nth-child(2) span { animation-delay: 1.1s; }
    .frase-linha:nth-child(3) span {
      animation-delay: 1.3s;
      color: #D4AF37;
      font-style: italic;
    }

    @keyframes slideUp {
      to { transform: translateY(0); }
    }

    /* Sub */
    .sub-frase {
      font-size: 1rem;
      color: rgba(255,255,255,.45);
      letter-spacing: .04em;
      opacity: 0;
      animation: fadeUp .7s ease 1.8s forwards;
      margin-bottom: 48px;
    }

    /* Barra de progresso */
    .progress-wrap {
      opacity: 0;
      animation: fadeUp .5s ease 2s forwards;
    }
    .progress-label {
      font-size: .72rem;
      color: rgba(255,255,255,.35);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .progress-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,.1);
      border-radius: 1px;
      margin: 0 auto;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #D4AF37;
      border-radius: 1px;
      width: 0;
      animation: fillBar 2.5s ease 2.2s forwards;
    }
    @keyframes fillBar {
      to { width: 100%; }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Ring decorativo */
    .ring {
      position: fixed;
      border: 1px solid rgba(212,175,55,.08);
      border-radius: 50%;
      top: 50%; left: 50%;
      animation: spinRing linear infinite;
    }
    .ring-1 { width: 400px; height: 400px; margin: -200px 0 0 -200px; animation-duration: 30s; }
    .ring-2 { width: 600px; height: 600px; margin: -300px 0 0 -300px; animation-duration: 50s; animation-direction: reverse; }
    @keyframes spinRing { to { transform: rotate(360deg); } }

    /* Fade out da splash */
    .splash-exit {
      animation: exitSplash .6s ease forwards;
    }
    @keyframes exitSplash {
      to { opacity: 0; transform: scale(1.04); }
    }
  </style>
</head>
<body>

  <!-- Fundo -->
  <div class="bg-glow"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="bg-particles" id="particles"></div>

  <!-- Conteúdo -->
  <div class="splash" id="splash">
    <div class="gold-line"></div>

    <div class="logo-wrap">
      <div class="logo-text">
        <span class="lf">Forma</span><span class="lp">Print</span><span class="lb"> BR</span>
      </div>
    </div>

    <div class="frase-wrap">
      <div class="frase-linha"><span>Seu currículo profissional</span></div>
      <div class="frase-linha"><span>está prestes a mudar</span></div>
      <div class="frase-linha"><span>a sua história!</span></div>
    </div>

    <div class="sub-frase">Feito com orgulho no Maranhão · Para o Brasil todo</div>

    <div class="progress-wrap">
      <div class="progress-label">Carregando</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <script>
    // Gerar partículas flutuantes
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size  = Math.random() * 60 + 20;
      const left  = Math.random() * 100;
      const delay = Math.random() * 8;
      const dur   = Math.random() * 10 + 8;
      p.style.cssText = `width:${size}px;height:${size}px;left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s`;
      container.appendChild(p);
    }

    // Redirecionar após a animação terminar
    const DESTINO = 'index.html'; // ou 'pages/modelos.html'
    const TEMPO_SPLASH = 5000;    // 5 segundos

    // Verificar se já viu hoje (não mostrar toda vez)
    const hoje   = new Date().toDateString();
    const viu    = localStorage.getItem('fpbr_splash_data');

    if (viu === hoje) {
      // Já viu hoje: vai direto para o site
      window.location.replace(DESTINO);
    } else {
      // Primeira vez do dia: mostra a splash
      localStorage.setItem('fpbr_splash_data', hoje);

      setTimeout(() => {
        document.getElementById('splash').classList.add('splash-exit');
        setTimeout(() => {
          window.location.href = DESTINO;
        }, 600);
      }, TEMPO_SPLASH);

      // Clicar para pular
      document.body.addEventListener('click', () => {
        document.getElementById('splash').classList.add('splash-exit');
        setTimeout(() => { window.location.href = DESTINO; }, 400);
      });
    }
  </script>
</body>
</html>
