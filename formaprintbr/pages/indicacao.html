<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indicar e Ganhar — FormaPrint BR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body{background:var(--navy);min-height:100vh}
    .ip{max-width:600px;margin:0 auto;padding:90px 20px 60px}
    .ic{background:var(--white);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.3);overflow:hidden;margin-bottom:16px}
    .ic-top{background:var(--gold);padding:18px 24px;display:flex;align-items:center;gap:14px}
    .ic-top .val{font-family:var(--display);font-size:2rem;font-weight:900;color:var(--navy);line-height:1}
    .ic-top .vlbl{font-size:.78rem;font-weight:700;color:rgba(27,42,74,.65)}
    .ic-body{padding:22px 24px}
    .link-box{display:flex;border:1.5px solid var(--light);border-radius:9px;overflow:hidden;margin-bottom:14px}
    .link-txt{flex:1;padding:10px 13px;font-size:.82rem;color:var(--navy);font-family:monospace;background:var(--off);border:none;outline:none}
    .btn-cpy{background:var(--navy);color:var(--white);font-weight:700;font-size:.8rem;padding:10px 14px;border:none;cursor:pointer;font-family:var(--body);transition:background .2s;white-space:nowrap}
    .btn-cpy:hover{background:var(--navy2)}
    .share-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .btn-share{display:flex;align-items:center;justify-content:center;gap:7px;font-weight:700;font-size:.86rem;padding:12px;border-radius:9px;border:none;cursor:pointer;font-family:var(--body);transition:all .2s;text-decoration:none}
    .bs-wpp{background:#25D366;color:var(--white)}
    .bs-wpp:hover{background:#1aaa52}
    .bs-cp{background:var(--off);border:1.5px solid var(--light);color:var(--navy)}
    .bs-cp:hover{background:var(--light)}
    .cnt-row{display:flex;gap:10px;margin-bottom:18px}
    .cnt-box{flex:1;background:var(--off);border-radius:9px;padding:13px;text-align:center}
    .cnt-num{font-family:var(--display);font-size:1.7rem;font-weight:900;color:var(--navy);line-height:1;margin-bottom:3px}
    .cnt-lbl{font-size:.7rem;color:var(--gray)}
    .how-box{background:var(--off);border-radius:10px;padding:15px;margin-top:4px}
    .how-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:11px}
    .how-n{width:24px;height:24px;border-radius:50%;background:var(--navy);color:var(--white);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .how-txt strong{display:block;font-size:.84rem;color:var(--navy);margin-bottom:1px}
    .how-txt span{font-size:.74rem;color:var(--gray)}
    .no-conta-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:24px;text-align:center;margin-bottom:16px}
    .no-conta-card h3{color:var(--white);margin-bottom:7px;font-size:1.05rem}
    .no-conta-card p{color:rgba(255,255,255,.55);font-size:.84rem;margin-bottom:18px}
  </style>
</head>
<body>
  <nav class="navbar scrolled"><div class="nav-inner"><a href="../index.html" class="logo"><span class="logo-forma">Forma</span><span class="logo-print">Print</span><span class="logo-br"> BR</span></a><a href="editor.html" class="btn-criar-nav" style="margin-left:auto"><i class="ph-bold ph-file-text"></i> Criar curriculo</a></div></nav>
  <div class="ip" id="indPage"></div>
  <div class="toast" id="toast"></div>
  <script>
    const email=localStorage.getItem('fpbr_email_usuario');
    const temConta=!!(email&&email.includes('@'));
    const temCompra=localStorage.getItem('fpbr_pago')==='true';
    let codigo=localStorage.getItem('fpbr_ref_code');
    if(!codigo&&temConta&&temCompra){codigo=Math.random().toString(36).substring(2,8).toUpperCase();localStorage.setItem('fpbr_ref_code',codigo)}
    const page=document.getElementById('indPage');
    const inds=JSON.parse(localStorage.getItem('fpbr_indicacoes')||'[]');
    const confirmados=inds.filter(i=>i.status==='confirmado').length;

    if(!temConta||!temCompra){
      page.innerHTML=`
        <div style="text-align:center;margin-bottom:24px"><span class="sec-badge light">Indicar e Ganhar</span><h1 style="color:var(--white);margin:10px 0 8px">Indique e ganhe curriculos gratis</h1><p style="color:rgba(255,255,255,.55)">Compartilhe com amigos e ganhe curriculos gratis</p></div>
        <div class="no-conta-card">
          <i class="ph ph-lock-simple" style="font-size:2.5rem;color:rgba(255,255,255,.25);display:block;margin:0 auto 14px"></i>
          <h3>${!temConta?'Crie sua conta primeiro':'Compre seu primeiro curriculo'}</h3>
          <p>${!temConta?'Para ter um link de indicacao voce precisa criar uma conta e realizar a primeira compra.':'Apos comprar seu primeiro curriculo, voce recebe seu link de indicacao exclusivo.'}</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            ${!temConta?`<a href="login.html" class="btn-primary"><i class="ph-bold ph-user-plus"></i> Criar conta gratis</a>`:''}
            <a href="modelos.html" class="btn-primary" style="background:rgba(255,255,255,.15);color:var(--white)"><i class="ph-bold ph-file-text"></i> Criar curriculo</a>
          </div>
        </div>
        <div class="ic"><div class="ic-body"><div style="font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:12px">Como funciona</div><div class="how-box"><div class="how-step"><div class="how-n">1</div><div class="how-txt"><strong>Crie conta + compre seu curriculo</strong><span>Voce recebe seu link unico de indicacao</span></div></div><div class="how-step"><div class="how-n">2</div><div class="how-txt"><strong>Compartilhe no WhatsApp</strong><span>Grupos de emprego, amigos, familia</span></div></div><div class="how-step" style="margin-bottom:0"><div class="how-n">3</div><div class="how-txt"><strong>Cada compra pelo seu link = 1 curriculo gratis</strong><span>Sem limite de indicacoes</span></div></div></div></div></div>`;
    } else {
      const linkUrl=`https://formaprintbr.com.br/ref/${codigo}`;
      const msg=encodeURIComponent(`Fiz meu curriculo no FormaPrint BR por so R$2,50 e ficou profissional demais!\n\nCria o seu pelo meu link:\n${linkUrl}\n\n#FormaPrintBR`);
      page.innerHTML=`
        <div style="text-align:center;margin-bottom:24px"><span class="sec-badge light">Seu painel</span><h1 style="color:var(--white);margin:10px 0 6px">Indicar e Ganhar</h1><p style="color:rgba(255,255,255,.55)">Compartilhe e ganhe curriculos gratis</p></div>
        <div class="ic">
          <div class="ic-top"><div><div class="val">${confirmados}</div><div class="vlbl">curriculos gratis ganhos</div></div><i class="ph ph-trophy" style="font-size:2rem;color:var(--navy);margin-left:auto"></i></div>
          <div class="ic-body">
            <div class="cnt-row">
              <div class="cnt-box"><div class="cnt-num">${inds.length}</div><div class="cnt-lbl">indicacoes feitas</div></div>
              <div class="cnt-box"><div class="cnt-num" style="color:#16a34a">${confirmados}</div><div class="cnt-lbl">confirmadas</div></div>
            </div>
            <div style="font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:7px">Seu link de indicacao</div>
            <div class="link-box"><input class="link-txt" id="linkInp" value="${linkUrl}" readonly><button class="btn-cpy" onclick="copiar()"><i class="ph ph-copy"></i> Copiar</button></div>
            <div class="share-grid">
              <a href="https://wa.me/?text=${msg}" target="_blank" class="btn-share bs-wpp"><i class="ph-bold ph-whatsapp-logo"></i> Compartilhar</a>
              <button class="btn-share bs-cp" onclick="copiar()"><i class="ph ph-copy"></i> Copiar link</button>
            </div>
            <div class="how-box" style="margin-top:14px"><div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:10px">Seu cupom para curriculo gratis</div><div style="background:var(--white);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:.85rem;font-weight:700;color:var(--navy);font-family:monospace">GRATIS-${codigo}</span><button onclick="copiarCupom()" style="font-size:.74rem;font-weight:700;color:var(--gold2);background:none;border:none;cursor:pointer">Copiar</button></div><p style="font-size:.72rem;color:var(--gray);margin-top:7px">Use este cupom na proxima compra para ganhar o curriculo de graca</p></div>
          </div>
        </div>`;
    }

    function copiar(){
      const link=`https://formaprintbr.com.br/ref/${codigo}`;
      navigator.clipboard.writeText(link).then(()=>t('Link copiado!','success')).catch(()=>{document.getElementById('linkInp').select();document.execCommand('copy');t('Link copiado!','success')});
    }
    function copiarCupom(){
      navigator.clipboard.writeText(`GRATIS-${codigo}`).then(()=>t('Cupom copiado!','success')).catch(()=>{});
    }
    function t(msg,tipo=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+tipo;void el.offsetWidth;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3500)}
  </script>
</body>
</html>
