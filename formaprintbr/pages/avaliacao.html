<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avaliar — FormaPrint BR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body{background:var(--off)}
    .ap{max-width:520px;margin:0 auto;padding:90px 20px 60px}
    .ac{background:var(--white);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
    .ac-hd{background:var(--navy);padding:18px 24px}
    .ac-hd h3{color:var(--white);font-size:1rem;margin-bottom:2px}
    .ac-hd p{color:rgba(255,255,255,.5);font-size:.78rem}
    .ac-body{padding:22px 24px}
    .stars{display:flex;gap:8px;justify-content:center;margin-bottom:22px}
    .star{font-size:2.2rem;cursor:pointer;color:var(--light);transition:color .15s,transform .15s;line-height:1;user-select:none}
    .star.on{color:var(--gold);transform:scale(1.12)}
    .btn-env{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--gold);color:var(--navy);font-weight:700;font-size:.95rem;padding:13px;border-radius:10px;border:none;cursor:pointer;font-family:var(--body);transition:all .2s;margin-top:6px}
    .btn-env:hover{background:var(--gold2)}
    .suc{display:none;text-align:center;padding:40px 24px}
    .suc i{font-size:3rem;color:#16a34a;display:block;margin-bottom:14px}
    .suc h3{color:var(--navy);margin-bottom:9px}
  </style>
</head>
<body>
  <nav class="navbar scrolled"><div class="nav-inner"><a href="../index.html" class="logo"><span class="logo-forma">Forma</span><span class="logo-print">Print</span><span class="logo-br"> BR</span></a></div></nav>
  <div class="ap">
    <div style="text-align:center;margin-bottom:24px">
      <span class="sec-badge">Sua opiniao importa</span>
      <h1 style="color:var(--navy);margin:10px 0 6px;font-size:clamp(1.5rem,4vw,2rem)">Como foi sua experiencia?</h1>
      <p>Sua avaliacao aparece no site e ajuda outras pessoas.</p>
    </div>
    <div class="ac">
      <div class="ac-hd"><h3>Deixe sua avaliacao</h3><p>Leva menos de 1 minuto</p></div>
      <div class="ac-body" id="avalForm">
        <div style="text-align:center;margin-bottom:6px;font-size:.8rem;font-weight:700;color:var(--navy)">Sua nota</div>
        <div class="stars" id="stars">
          <span class="star" data-v="1" onclick="setNota(1)">★</span>
          <span class="star" data-v="2" onclick="setNota(2)">★</span>
          <span class="star" data-v="3" onclick="setNota(3)">★</span>
          <span class="star" data-v="4" onclick="setNota(4)">★</span>
          <span class="star" data-v="5" onclick="setNota(5)">★</span>
        </div>
        <div class="form-group"><label>Seu nome *</label><input type="text" id="avNome" placeholder="Ex: Maria Silva"></div>
        <div class="form-group"><label>Cidade e estado</label><input type="text" id="avLocal" placeholder="Sao Luis, MA"></div>
        <div class="form-group">
          <label>Conseguiu emprego?</label>
          <select id="avEmp"><option value="">Selecione...</option><option value="sim_rapido">Sim, em menos de 1 semana</option><option value="sim">Sim, consegui emprego</option><option value="entrevista">Fui chamado para entrevistas</option><option value="processo">Ainda em processo</option><option value="nao">Ainda nao</option></select>
        </div>
        <div class="form-group"><label>Sua experiencia *</label><textarea id="avTxt" rows="4" placeholder="Como foi usar o FormaPrint BR? O design ficou bom? A IA ajudou?"></textarea></div>
        <button class="btn-env" onclick="enviar()"><i class="ph-bold ph-paper-plane-right"></i> Enviar avaliacao</button>
      </div>
      <div class="suc" id="avalSuc"><i class="ph-bold ph-check-circle"></i><h3>Obrigado pela avaliacao!</h3><p style="margin-bottom:20px">Ela aparecera na pagina inicial para ajudar outras pessoas.</p><a href="../index.html" class="btn-primary" style="display:inline-flex;margin:0 auto"><i class="ph-bold ph-arrow-left"></i> Voltar ao inicio</a></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    let nota=0;
    function setNota(n){nota=n;document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<n))}
    function enviar(){
      const nome=document.getElementById('avNome').value.trim();
      const txt=document.getElementById('avTxt').value.trim();
      const local=document.getElementById('avLocal').value.trim();
      const emp=document.getElementById('avEmp').value;
      if(!nota){t('Selecione uma nota.','error');return}
      if(!nome){t('Preencha seu nome.','error');return}
      if(txt.length<20){t('Escreva um pouco mais sobre sua experiencia.','error');return}
      let cargo=local||'Usuario FormaPrint BR';
      if(emp==='sim_rapido')cargo='Contratado em menos de 1 semana'+(local?' — '+local:'');
      else if(emp==='sim')cargo='Contratado com sucesso'+(local?' — '+local:'');
      else if(emp==='entrevista')cargo='Chamado para entrevistas'+(local?' — '+local:'');
      const avs=JSON.parse(localStorage.getItem('fpbr_avaliacoes')||'[]');
      avs.push({nota,texto:txt,nome,cargo,cor:['#1B2A4A','#D4AF37','#7B2D42','#2D5A27','#1B4F6B'][Math.floor(Math.random()*5)],data:new Date().toLocaleDateString('pt-BR')});
      localStorage.setItem('fpbr_avaliacoes',JSON.stringify(avs));
      document.getElementById('avalForm').style.display='none';
      document.getElementById('avalSuc').style.display='block';
    }
    function t(msg,tipo=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+tipo;void el.offsetWidth;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3500)}
  </script>
</body>
</html>
